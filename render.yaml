services:
  - type: web
    name: stream-hunter
    env: node
    plan: starter
    buildCommand: npm install && npx playwright install chromium && npm run build
    startCommand: npm start
    envVars:
      - key: PORT
        value: 3000
      - key: CACHE_TTL_MINUTES
        value: 30
      - key: TMDB_API_KEY
        sync: false
